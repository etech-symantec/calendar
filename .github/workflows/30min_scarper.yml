name: Every 15 min Web Scraper

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: # 수동으로 실행할 수 있는 버튼 활성화 (테스트용으로 필수!)

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest # 가상 리눅스 환경에서 실행

    steps:
      - name: 1. 레포지토리 코드 가져오기 (Checkout)
        uses: actions/checkout@v4

      - name: 2. Python 환경 세팅
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 2-1. 한글 폰트 설치 (글씨 깨짐 방지)
        run: sudo apt-get update && sudo apt-get install -y fonts-nanum

      # pip 및 브라우저 캐싱
      - name: 3. 패키지 및 브라우저 다운로드 캐시
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-and-pip-${{ hashFiles('resource.py') }}
          restore-keys: |
            ${{ runner.os }}-playwright-and-pip-

      - name: 4. 패키지 및 브라우저 설치 (Playwright & Chromium)
        run: |
          python -m pip install --upgrade pip
          pip install playwright requests
          playwright install chromium

      - name: 4. 파이썬 스크립트 실행 (웹 스크래핑 -> resource.html 생성)
        env: # ⬅️ 이 부분을 추가합니다! (금고에서 꺼내서 환경 변수로 전달)
          MY_SITE_ID: ${{ secrets.MY_SITE_ID }}
          MY_SITE_PW: ${{ secrets.MY_SITE_PW }}
          JANDI_WEBHOOK_URL: ${{ secrets.JANDI_WEBHOOK_URL }}
        run: python resource.py
        
      - name: 5. 변경된 HTML 파일 커밋 및 푸시
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add resource.html
          # 변경 사항이 없을 경우 에러가 나지 않도록 예외 처리
          git commit -m "Auto-update: 최신 테이블 데이터 갱신" || echo "No changes to commit"
          git push

      - name: 6. 변경된 HTML 파일 커밋 및 푸시
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add resource.html
          git commit -m "Auto-update: 최신 테이블 데이터 갱신" || echo "No changes to commit"
          git push

      # 🌟 [여기를 추가해주세요] 에러 발생 시 캡처된 이미지를 다운로드할 수 있게 해줍니다.
      - name: 7. 디버깅용 스크린샷 업로드 (에러 확인용)
        if: always() # 스크립트가 에러로 멈춰도 무조건 실행됨
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: '*.png'
